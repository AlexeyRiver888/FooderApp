<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Fooder</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Fooder</p>
          <h1>Куда идем?</h1>
        </div>
        <button class="ghost-button hidden" id="adminToggle">Админ</button>
      </header>

      <section class="panel" id="statusPanel">
        <p class="eyebrow" id="datePill">--</p>
        <h2 id="stageTitle">Загрузка...</h2>
        <p class="hint" id="stageHint">Открываем сегодняшнюю сессию.</p>
        <button class="primary-button hidden" id="joinButton">Погнали</button>
        <button class="primary-button hidden" id="startVoteButton">Голосовать</button>
        <button class="primary-button hidden" id="revealButton">Узнать куда идем?</button>
      </section>

      <section class="panel hidden" id="peoplePanel">
        <div class="session-status">
          <div>
            <p class="eyebrow">Идут на обед</p>
            <strong id="activeCount">0 чел.</strong>
          </div>
          <span class="status-dot" id="sessionStatus">сбор</span>
        </div>
        <div class="people-list" id="peopleList"></div>
      </section>

      <section class="winner hidden" id="winnerPanel"></section>

      <section class="deck hidden" id="deck">
        <article class="venue-card" id="venueCard">
          <img id="venueImage" alt="" />
          <div class="card-shade"></div>
          <div class="vote-badge yes">Да</div>
          <div class="vote-badge no">Нет</div>
          <div class="vote-badge veto">Ветто</div>
          <div class="venue-copy">
            <p id="venueAddress"></p>
            <h2 id="venueName"></h2>
          </div>
        </article>
      </section>

      <section class="actions hidden" id="actions">
        <button class="icon-action no" id="noButton" aria-label="Нет">←</button>
        <button class="icon-action veto" id="vetoButton" aria-label="Ветто">!</button>
        <button class="icon-action yes" id="yesButton" aria-label="Да">→</button>
      </section>

      <section class="panel admin-panel hidden" id="adminPanel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Админка</p>
            <h2>Заведения</h2>
          </div>
          <button class="ghost-button" id="resetFormButton">Новое</button>
        </div>
        <button class="danger-button" id="resetSessionButton" type="button">Сбросить сегодняшнюю сессию</button>
        <p class="hint admin-warning">Сброс очистит участников и голоса за сегодня. Заведения останутся.</p>
        <form class="venue-form" id="venueForm">
          <input id="venueIdInput" type="hidden" />
          <label>
            Название
            <input id="venueNameInput" required placeholder="Например, Бюро" />
          </label>
          <label>
            Адрес
            <input id="venueAddressInput" required placeholder="Улица, дом" />
          </label>
          <label>
            Фото
            <input id="venuePhotoInput" type="file" accept="image/*" />
          </label>
          <input id="venueImageInput" type="hidden" />
          <img class="image-preview hidden" id="venueImagePreview" alt="" />
          <p class="hint">Фото будет автоматически ужато перед сохранением.</p>
          <button class="primary-button" id="saveVenueButton" type="submit">Сохранить</button>
        </form>
        <div class="venue-list" id="venueList"></div>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
